services:
  backend:
    command: sh -c "npm run prisma:generate && npm run prisma:push && npm run dev"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./backend:/app/backend

  frontend:
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app/frontend

  validator:
    command: python -m uvicorn main:app --host 0.0.0.0 --port 3001 --reload
    environment:
      PYTHONUNBUFFERED: 1
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./validator:/app
