services:
  postgres:
    image: postgres:15-alpine
    container_name: mathe-quiz-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mathe_quiz}
      POSTGRES_USER: ${POSTGRES_USER:-mathe_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env or --env-file}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-mathe_user} -d ${POSTGRES_DB:-mathe_quiz}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  validator:
    build:
      context: .
      dockerfile: validator/Dockerfile
    container_name: mathe-quiz-validator
    environment:
      PYTHONUNBUFFERED: 1
      PORT: ${VALIDATOR_INTERNAL_PORT:-8001}
    expose:
      - "${VALIDATOR_INTERNAL_PORT:-8001}"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mathe-quiz-backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-mathe_user}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env or --env-file}@postgres:5432/${POSTGRES_DB:-mathe_quiz}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env or --env-file}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-https://mathe-quiz.elmarhepp.de}
      VALIDATOR_URL: ${VALIDATOR_URL:-http://validator:8001}
    ports:
      - "127.0.0.1:${API_PORT:-3042}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      validator:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://mathe-quiz-api.elmarhepp.de}
        VITE_LEGAL_NAME: ${VITE_LEGAL_NAME:-}
        VITE_LEGAL_EMAIL: ${VITE_LEGAL_EMAIL:-}
        VITE_LEGAL_ADDRESS_LINE_1: ${VITE_LEGAL_ADDRESS_LINE_1:-}
        VITE_LEGAL_ADDRESS_LINE_2: ${VITE_LEGAL_ADDRESS_LINE_2:-}
        VITE_LEGAL_COUNTRY: ${VITE_LEGAL_COUNTRY:-}
        VITE_LEGAL_CONTENT_RESPONSIBLE: ${VITE_LEGAL_CONTENT_RESPONSIBLE:-}
    container_name: mathe-quiz-frontend
    ports:
      - "127.0.0.1:${WEB_PORT:-3041}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
