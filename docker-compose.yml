services:
  postgres:
    image: postgres:15-alpine
    container_name: mathe-quiz-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mathe_quiz}
      POSTGRES_USER: ${POSTGRES_USER:-mathe_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mathe_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mathe_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  validator:
    build:
      context: .
      dockerfile: validator/Dockerfile
    container_name: mathe-quiz-validator
    environment:
      PYTHONUNBUFFERED: 1
    ports:
      - "${VALIDATOR_PORT:-3001}:3001"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mathe-quiz-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-mathe_user}:${POSTGRES_PASSWORD:-mathe_pass}@postgres:5432/${POSTGRES_DB:-mathe_quiz}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      VALIDATOR_URL: ${VALIDATOR_URL:-http://validator:3001}
    ports:
      - "${API_PORT:-3032}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      validator:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: mathe-quiz-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3032}
    ports:
      - "${WEB_PORT:-3031}:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
